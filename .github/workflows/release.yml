name: Release

# Fires on every push to main that isn't itself a release tag commit.
# Infers the semver bump from conventional commit prefixes in the commits
# since the last tag:
#   feat! / BREAKING CHANGE  →  major
#   feat                     →  minor
#   everything else          →  patch
#
# Skip a release entirely by including [skip release] in a commit message.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Auto-bump & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest tag
        id: current
        run: |
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Collect commits since last tag
        id: commits
        run: |
          FROM="${{ steps.current.outputs.tag }}"
          if git rev-parse "$FROM" >/dev/null 2>&1; then
            RANGE="${FROM}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Full messages (for breaking-change footer detection)
          git log "$RANGE" --no-merges --format="%B" > /tmp/full_messages.txt

          # One-line summaries (for changelog)
          git log "$RANGE" --no-merges --format="- %s (%h)" > /tmp/changelog.txt

          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"

      - name: Check for [skip release]
        id: skip
        run: |
          if grep -qi '\[skip release\]' /tmp/full_messages.txt; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type
        id: bump
        if: steps.skip.outputs.skip == 'false'
        run: |
          BUMP=patch

          # Major: breaking-change footer OR feat! / fix! / refactor! prefix
          if grep -qE '^BREAKING[- ]CHANGE' /tmp/full_messages.txt || \
             grep -qE '^\w+(\(.+\))?!:' /tmp/full_messages.txt; then
            BUMP=major
          # Minor: any feat commit (non-breaking)
          elif grep -qE '^feat(\(.+\))?:' /tmp/full_messages.txt; then
            BUMP=minor
          fi

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        if: steps.skip.outputs.skip == 'false'
        run: |
          CURRENT="${{ steps.current.outputs.tag }}"
          VERSION="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        if: steps.skip.outputs.skip == 'false'
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          BUMP="${{ steps.bump.outputs.bump }}"
          FROM="${{ steps.current.outputs.tag }}"

          {
            echo "body<<NOTES_EOF"
            echo "## What's changed"
            echo ""
            cat /tmp/changelog.txt
            echo ""
            echo "---"
            echo "_Bump type: \`${BUMP}\` · Previous tag: \`${FROM}\` → \`${NEXT}\`_"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Tag & push
        if: steps.skip.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"

      - name: Create GitHub release
        if: steps.skip.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.version }}
          name: ${{ steps.next.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
