name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type (push)
        if: github.event_name == 'push'
        id: detect
        run: |
          # Collect commit messages since the last tag (or all commits if no tag yet)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          BUMP=patch
          while IFS= read -r msg; do
            # BREAKING CHANGE footer or ! after type
            if echo "$msg" | grep -qP '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              BUMP=major
              break
            fi
            if echo "$msg" | grep -qP '^feat(\(.+\))?:'; then
              BUMP=minor
            fi
          done <<< "$COMMITS"

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"

      - name: Set bump type (manual)
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "bump=${{ github.event.inputs.bump }}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Skip if no new commits
        if: |
          (github.event_name == 'push'       && steps.detect.outputs.skip == 'true') ||
          (github.event_name == 'workflow_dispatch' && steps.manual.outputs.skip == 'true')
        run: |
          echo "No new commits since last tag — skipping release."
          exit 0

      - name: Compute next version
        id: version
        run: |
          BUMP=${{ github.event_name == 'push' && steps.detect.outputs.bump || steps.manual.outputs.bump }}

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.previous_tag }}"
          if [ "$PREV" = "v0.0.0" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV}..HEAD")
          fi
          # Escape for GitHub output (multiline)
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"     >> "$GITHUB_OUTPUT"
          echo "EOF"      >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.log }}

            **Full diff:** ${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.version.outputs.previous_tag }}...${{ steps.version.outputs.tag }}
          generate_release_notes: false
